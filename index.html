<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Карта этажа — Навигатор</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Навигатор">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- 1. Иконки грузятся С ВАШЕГО КОМПЬЮТЕРА (работают без интернета) -->
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    
    <!-- 2. Ваши стили всегда идут последними -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="map"></div>

<div class="left-panel">
    <!-- Верхняя панель кнопок -->
    <div id="ui-zoom" class="zoom-panel">
        <button id="zoom-in" title="Приблизить"><i class="fas fa-plus"></i></button>
        <button id="zoom-out" title="Отдалить"><i class="fas fa-minus"></i></button>
        <button id="reset-view" title="Сбросить вид"><i class="fas fa-home"></i></button>
        <button id="toggle-search" title="Поиск"><i class="fas fa-search"></i></button>
        <button id="clear-route" title="Очистить маршрут"><i class="fas fa-times"></i></button>
        <button id="toggle-filter-btn" title="Фильтры"><i class="fas fa-filter"></i></button>
    </div>  

    <!-- Панель этажей -->
    <div id="floor-panel" class="zoom-panel">
        <button class="floor-btn active" data-floor="1">1</button> 
        <button class="floor-btn" data-floor="2">2</button>
        <button class="floor-btn" data-floor="3">3</button>
        <button class="floor-btn" data-floor="4">4</button>
    </div>

    <!-- Панель фильтров -->
    <div id="filter-panel" class="filter-panel">
        <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #374151;">Отображать на карте:</h4>
        <!-- Добавил чекбокс "Выбрать всё", так как в JS он используется (id="filter-all") -->
        <label><input type="checkbox" id="filter-all"> <i class="fas fa-check-double" style="color: #10b981;"></i> Включить всё</label>
        <label><input type="checkbox" class="filter-cb" value="wc"> <i class="fas fa-restroom" style="color: #3b82f6;"></i> Туалеты</label>
        <label><input type="checkbox" class="filter-cb" value="food"> <i class="fas fa-utensils" style="color: #ef4444;"></i> Столовая</label>
        <label><input type="checkbox" class="filter-cb" value="coffee"> <i class="fas fa-mug-hot" style="color: #8b5a2b;"></i> Кофемашины</label>
        <label><input type="checkbox" class="filter-cb" value="library"> <i class="fas fa-book" style="color: #0d9488;"></i> Библиотека</label>
        <label><input type="checkbox" class="filter-cb" value="wardrobe"> <i class="fas fa-shirt" style="color: #8b5cf6;"></i> Гардероб</label>
        <label><input type="checkbox" class="filter-cb" value="print"> <i class="fas fa-print" style="color: #475569;"></i> Печать</label>
    </div>

    <!-- Панель поиска -->
<div id="search-panel" class="search-panel">
    <div class="form-row">
        <label for="start-cabinet">От:</label>
        <div class="input-wrapper">
            <input type="text" id="start-cabinet" autocomplete="off" placeholder="Например: 202">
            <div id="start-list" class="autocomplete-list"></div>
        </div>
    </div>
    <div class="form-row">
        <label for="end-cabinet">До:</label>
        <div class="input-wrapper">
            <input type="text" id="end-cabinet" autocomplete="off" placeholder="Например: 261/14">
            <div id="end-list" class="autocomplete-list"></div>
        </div>
    </div>
    <button id="search-btn"><i class="fas fa-route"></i></button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/ngraph.graph@20.0.1/dist/ngraph.graph.min.js"></script>
<script src="https://unpkg.com/ngraph.path@1.3.1/dist/ngraph.path.min.js"></script>
<script src="app.js"></script>

</body>
</html>
